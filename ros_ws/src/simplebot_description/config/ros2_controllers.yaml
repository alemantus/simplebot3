# controller_manager provides the necessary infrastructure to manage multiple controllers
# efficiently and robustly using ROS 2 Control.
controller_manager:
  ros__parameters:
    update_rate: 500 # Hz

    # Declare the controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

    hand_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

# Parameters for the mecanum drive controller
mecanum_drive_controller:
  ros__parameters:
    use_stamped_vel: true

    # Joint names for stock controller
    front_left_wheel_command_joint_name: front_left_wheel_joint
    front_right_wheel_command_joint_name: front_right_wheel_joint
    rear_left_wheel_command_joint_name: rear_left_wheel_joint
    rear_right_wheel_command_joint_name: rear_right_wheel_joint

    kinematics:
      base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
      wheels_radius: 0.033
      wheel_separation: 0.206
      wheel_base: 0.13
      sum_of_robot_center_projection_on_X_Y_axis: 0.168 # (0.206 + 0.13) / 2 = 0.168
      # sum_of_robot_center_projection_on_X_Y_axis: 0.336 # (0.206 + 0.13) = 0.336

    # TF configuration
    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    reference_timeout: 0.5

hand_controller:
  ros__parameters:
    joints:
      - roarm_base_link_to_link1
      - link1_to_link2
      - link2_to_link3
      - link3_to_link4
      - link4_to_link5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    # Added interpolation and constraints for better arm movement
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

gripper_controller:
  ros__parameters:
    # This must be the SINGLE actuated joint that drives the mimic joints
    joint: straight_bracket_left_joint
    # Optional: Define tolerances if using GripperCommand actions
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 10.0
    allow_stalling: true
