twist_mux:
  ros__parameters:
    topics:
      navigation:
        topic: cmd_vel_nav
        timeout: 0.5
        priority: 10
      teleop:
        topic: cmd_vel_teleop
        timeout: 0.5
        priority: 100
    # Enable stamped output for the mecanum controller
    use_stamped: true
    # Send the merged velocity commands directly to the mecanum controller
    output_topic: mecanum_drive_controller/cmd_vel_test
